name: gemzi_user_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  animate_do: ^4.2.0        
  glassmorphism: ^3.0.0 
  marquee: ^2.2.3
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  fl_chart: ^1.2.0
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.2.4
  url_launcher: ^6.3.0
  permission_handler: ^12.0.1
  image: ^4.2.0

  # --- Firebase packages ---
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  google_sign_in: ^6.3.0
  provider: ^6.1.1
  razorpay_flutter: ^1.4.4
  mailer: ^7.1.0
  android_intent_plus: ^6.0.0

  # --- AR & Camera ---
  google_mlkit_face_detection: ^0.13.2
  google_mlkit_commons: ^0.11.1
  camera: ^0.12.0+1
  gal: ^2.1.0
  path_provider: ^2.1.2
  google_mlkit_face_mesh_detection: ^0.4.2
  screenshot: ^3.0.0
  hand_landmarker: ^2.1.2

dependency_overrides:
  camera: ^0.12.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true 
  assets:
    - assets/auth/
